        <div class="container-md">
            <a href="../" title="Página de inicio de la empresa">
                <img src="../assets/icons/logo.png" alt="Logo de la empresa" class="logo">

            </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="budget">
        <div class="container-md">
            <h2 class="mt-4">PRESUPUESTO</h2>
            <p>Por favor, complete el siguiente formulario para solicitar un presupuesto:</p>
            <div class="row align-items-top justify-content-evenly">
                <div class="col">
                    <form id="form">
                        <h3>Datos de contacto</h3>
                        <div class="form-floating">
                            <input type="text" name="name" id="name" class="form-control" placeholder="Nombre">
                            <label for="name">Nombre</label>
                        </div>
                        <div id="name-error" class="error-msg"></div>
                        <div class="form-floating mt-3">
                            <input type="text" name="surnames" id="surnames" class="form-control" placeholder="Apellidos">
                            <label for="surnames">Apellidos</label>
                        </div>
                        <div id="surnames-error" class="error-msg"></div>
                        <div class="form-floating mt-3">
                            <input type="tel" name="number" id="number" class="form-control" placeholder="Teléfono">
                            <label for="number">Teléfono</label>
                        </div>
                        <div id="number-error" class="error-msg"></div>
                        <div class="form-floating mt-3">
                            <input type="email" name="email" id="email" class="form-control" placeholder="Correo electrónico">
                            <label for="email">Correo electrónico</label>
                        </div>
                        <div id="email-error" class="error-msg"></div>
                        <h3 class="mt-3">Opciones</h3>
                        <div class="input-group">
                            <label for="product" class="input-group-text">Producto</label>
                            <select name="product" id="product" class="form-select">
                                <option value="" disabled selected>Seleccione un producto</option>
                                <option value="Pulverizador - 2.99">Pulverizador - 2,99 €</option>
                                <option value="Identificador de maletas - 3.99">Identificador de maletas - 3,99 €</option>
                                <option value="Imanes para coche - 3.99">Imanes para coche - 3,99 €</option>
                                <option value="Funda para pasaporte - 4.99">Funda para pasaporte - 4,99 €</option>
                                <option value="Soporte para mesa - 5.99">Soporte para mesa - 5,99 €</option>
                                <option value="Smart band - 9.99">Smart band - 9,99 €</option>
                                <option value="Cable de carga - 14.99">Cable de carga - 14,99 €</option>
                                <option value="Tarjetero soporte - 14.99">Tarjetero soporte - 14,99 €</option>
                                <option value="Soporte lámpara led - 19.99">Soporte lámpara led - 19,99 €</option>
                                <option value="Altavoz Bluetooth - 19.99">Altavoz Bluetooth - 19,99 €</option>
                                <option value="Cargador de pared - 19.99">Cargador de pared - 19,99 €</option>
                                <option value="Bolso para móvil - 19.99">Bolso para móvil - 19,99 €</option>
                                <option value="Altavoz karaoke - 39.99">Altavoz karaoke - 39,99 €</option>
                                <option value="Gimbal multifunción - 49.99">Gimbal multifunción - 49,99 €</option>
                                <option value="Smartwatch - 49.99">Smartwatch - 49,99 €</option>
                            </select>
                            <span class="input-group-text">
                                <i id="btn-add-product" class="product__btn-add-product fa-solid fa-circle-plus fa-xl"></i>
                            </span>
                        </div>
                        <div id="product-error" class="error-msg"></div>
                        <div class="input-group mt-3">
                            <label for="delivery-time" class="input-group-text">Plazo (días)</label>
                            <input type="number" name="delivery-time" id="delivery-time" class="form-control" placeholder="Plazo (días)" step="1" min="5" max="30">
                        </div>
                        <div id="delivery-time-error" class="error-msg"></div>
                        <div id="extras-options" class="mt-3">
                            <div class="form-check form-switch d-flex justify-content-center align-content-center">
                                <input type="checkbox" name="extra1" id="extra1" class="form-check-input me-3" role="switch" value="Embalaje especial - 5">
                                <label class="form-check-label" for="extra1">Embalaje especial - 5 €</label>
                            </div>
                            <div class="form-check form-switch d-flex justify-content-center align-content-center mb-3">
                                <input type="checkbox" name="extra2" id="extra2" class="form-check-input me-3" role="switch" value="Mensaje personalizado - 2">
                                <label class="form-check-label" for="extra2">Mensaje personalizado - 2 €</label>
                            </div>
                        </div>
                        <div class="form-check d-flex justify-content-center align-content-center">
                            <input type="checkbox" name="conditions" id="conditions" class="form-check-input me-3" value="Acepto las condiciones de privacidad">
                            <label class="form-check-label" for="conditions">Acepto las <a href="#" target="_blank">condiciones de privacidad</a>.</label>
                        </div>
                        <div id="conditions-error" class="error-msg mb-3"></div>
                        <div id="form-actions" class="form__form-actions">
                            <button type="button" id="btn-reset" class="btn btn-dark mb-3">Resetear formulario</button>
                            <button type="button" id="btn-submit" class="btn btn-dark mb-3">Enviar formulario</button>
                        </div>
                    </form>
                </div>
                <div id="budget-col" class="col">
                    <h3>Presupuesto</h3>
                    <div id="budget" class="table-responsive mb-3"></div>
                </div>
            </div>
        </div>
